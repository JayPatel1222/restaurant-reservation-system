<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <th:block th:replace="~{partial :: bootstrap}"/>
</head>
<footer th:fragment="footer" class="mt-auto">
  <div class="container">
    <div class="row align-items-center py-3">

      <div class="col-md-4 text-center text-md-start mb-2 mb-md-0">
        <span class="fw-bold fs-5">Urban Platter</span>
        <p class="small mb-0 text-white-50">Fresh ingredients. Creative flavors.</p>
      </div>

      <div class="col-md-4 text-center mb-2 mb-md-0">
        <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd : hh:mm a')}" class="text-warning"></span>
      </div>

      <div class="col-md-4 text-center text-md-end">
        <p class="small mb-0 text-white-50">© 2026 Urban Platter. All rights reserved.</p>
      </div>

    </div>
  </div>
</footer>
</html>
