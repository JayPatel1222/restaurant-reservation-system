<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <link rel="stylesheet" th:href="@{/css/details.css}">
    <th:block th:replace="~{event/styleFragment :: commonCss}"/>
    <title>Create Seating</title>
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>
<div class="container mt-3">
    <main class="row g-5">
        <div th:replace="~{reservation/fragments :: event}"></div>

        <div class="col-md-6">
            <!--/*@thymesVar id="id" type="nbcc.resto.dto.UrbanPlatterEvent"*/-->
            <form method="post"
                  th:action="@{/event/{eventId}/seating/create(eventId=${seating.platterEvent.id})}"
                  th:object="${seating}">

                <div th:replace="~{seating/fragments :: input}"></div>
                <div class="form-group">
                    <input type="submit" value="create" class="btn btn-success mt-2"/>
                </div>
            </form>
        </div>

        <div>
            <a th:href="@{/seating}"  class="btn btn-dark mt-2">Go Back</a>
        </div>
    </main>
</div>
<th:block th:replace="~{footer::footer}"/>
</body>
</html>
