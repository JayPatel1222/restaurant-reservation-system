<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link th:replace="~{partial :: bootstrap}"/>
</head>
<body>
<!--/*@thymesVar id="menu" type="nbcc.resto.dto.Menu"*/-->

<th:block th:fragment="input" th:object="${menu}">

    <input type="hidden" th:field="*{id}"/>

    <div class="alert alert-danger border-start border-danger border-4 rounded-3 py-2 px-3 mb-3"
         th:if="${#fields.hasGlobalErrors()}">
        <strong class="d-block mb-1">Please fix the following:</strong>
        <div th:each="err : ${#fields.globalErrors}" th:text="${err}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label text-uppercase fw-semibold small text-secondary">Menu Name</label>
        <input type="text"
               th:field="*{name}"
               class="form-control rounded-3"
               placeholder="e.g. Dinner Menu"/>
        <div class="text-danger small mt-1" th:errors="*{name}"></div>
    </div>

    <div class="mb-3">
        <label class="form-label text-uppercase fw-semibold small text-secondary">
            Description
            <span class="text-muted fw-normal text-lowercase">(optional)</span>
        </label>
        <textarea th:field="*{description}"
                  class="form-control rounded-3"
                  rows="4"
                  placeholder="Describe this menu..."></textarea>
    </div>

</th:block>


<div th:fragment="detail" th:object="${menu}">
    <div class="mb-4">
        <label class="text-muted small">Name</label>
        <div class="fs-5 fw-semibold" th:text="*{name}"></div>
    </div>

    <hr class="my-3">

    <div class="mb-4">
        <label class="text-muted small">Description</label>
        <div class="fs-6" th:text="*{(description ?: 'No description provided')}">
        </div>
    </div>

</div>
</body>
</html>
