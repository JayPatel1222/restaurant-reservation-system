<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Menu</title>
    <link th:replace="~{partial :: bootstrap}"/>
    <link rel="stylesheet" th:href="@{/css/commonStyle/button.css}">
</head>

<body>

<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>

<div class="container-fluid mt-5 px-5">

    <h1 class="mb-4">Create Menu</h1>

    <div class="row">

        <!-- LEFT -->
        <div class="col-md-4">
            <form th:action="@{/menu/create}" method="post">
                <div th:replace="~{menu/fragment::input}"></div>

                <div class="d-flex gap-3 mt-3 mb-2">
                    <button type="submit" class="btn btn-main px-4">Create</button>
                    <a th:href="@{/menu}" class="btn btn-secondary px-4">Go Back</a>

                </div>
            </form>
        </div>

    </div>

</div>

<th:block th:replace="~{footer :: footer}"/>

</body>
</html>
