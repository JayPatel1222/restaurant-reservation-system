<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete - [[${menu.name}]] </title>
    <link th:replace="~{partial :: bootstrap}"/>
    <link rel="stylesheet" th:href="@{/css/commonStyle/button.css}">
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>
<div class="container mt-5">

    <div class="mb-4">
        <h2 class="fw-bold">Menu Details</h2>
    </div>

    <div class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 600px; background: #ececec">

        <div class="card-body p-4">

            <th:block th:replace="~{/menu/fragment :: detail}"/>

            <div class="p-4">

                <h4 class="text-danger mb-3">Are you sure you want to delete this menu?</h4>

                <div class="d-flex justify-content-center gap-2">
                    <a th:href="@{/menu}" class="btn btn-secondary px-4">
                        Go Back
                    </a>
                  <form th:action="@{/menu/delete/{id}(id=*{id})}" method="post">
                    <button type="submit" class="btn btn-danger px-4">
                        Delete
                    </button>
                  </form>
                </div>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{footer :: footer}"/>
</body>
</html>
