<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmed</title>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <link rel="stylesheet" th:href="@{/css/details.css}">
    <th:block th:replace="~{event/styleFragment :: commonCss}"/>
</head>
<body class="bg-light">
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="card shadow-sm rounded-4 text-center p-4 border-0">
                <div class="card-body">
                    <h2 class="fw-bold text-success mb-3">Booking Confirmed! 🎉 </h2>
                    <p class="text-muted mb-0" th:text="${confirmation}"></p>
                </div>
            </div>

            <div class="card shadow-sm rounded-4 text-center p-4 border-0 mt-4">
                <div class="card-body">
                    <h5 class="fw-semibold mb-3">Booking tracking code: </h5>
                    <div class="bg-light border rounded p-3 mb-4">
                        <span class="fw-bold text-dark" th:text="${reservationId}"></span>
                    </div>
                    <p class="text-muted small mb-4">
                        Save this code or use the button below to view your reservation status and details later.
                    </p>
                    <a th:href="@{/reservation/booking/{uuid}(uuid=${reservationId})}"
                       class="btn btn-success px-4">
                        View Details
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{footer :: footer}"/>
</body>
</html>
