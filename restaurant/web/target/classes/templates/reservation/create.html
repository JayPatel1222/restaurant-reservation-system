<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <link rel="stylesheet" th:href="@{/css/details.css}">
    <th:block th:replace="~{event/styleFragment :: commonCss}"/>
    <title>Request Reservation</title>
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>

<div class="container mt-3">
    <div class="row g-5">
        <div th:replace="~{reservation/fragments :: event}"></div>
        <div th:replace="~{reservation/fragments :: menu}"></div>
        <div th:replace="~{reservation/fragments :: seating}"></div>
    </div>
    <div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
        <form method="post"
              th:action="@{/reservation/{eventId}/book/{seatingId}(eventId=${seating.platterEvent.id}, seatingId=${seating.id} )}"
              th:object="${reservation}">

            <div th:replace="~{reservation/fragments :: input}"></div>
            <div class="form-group">
                <input type="submit" value="Book" class="btn btn-success mt-2"/>
            </div>
        </form>
    </div>
</div>
    <a th:href="@{/reservation}" class="btn btn-main action-btn mt-2">
        Go Back
    </a>
</div>
<th:block th:replace="~{footer :: footer}"/>
</body>
</html>
