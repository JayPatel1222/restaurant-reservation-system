<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <title>Urban Platter Events</title>
    <link th:replace="~{partial :: bootstrap}"/>
    <link rel="stylesheet" th:href="@{/css/list.css}">
    <th:block th:replace="~{event/styleFragment :: commonCss}"/>

</head>

<body >
<header>
    <nav th:replace="~{nav :: nav}"></nav>
</header>
<div class="container">
    <main class="mt-4">
        <a th:href="@{/event/create}" class="btn btn-primary mb-3">Create Event</a>
        <div class=" searchArea-container mb-4">

            <div class=" search w-50 border p-4 rounded shadow-sm">
                <form th:action="@{/event/search}" method="get">

                    <div class="row g-3 mb-3 align-items-end">

                        <div class="col-md-5">
                            <label class="form-label">Event Name</label>
                            <input type="text"
                                   name="eventName"
                                   th:value="${viewModel.eventName}"
                                   class="form-control"
                                   placeholder="Search event">
                        </div>

                        <div class="col-md-5">
                            <label class="form-label">Start Date</label>
                            <input type="datetime-local"
                                   name="startDate"
                                   th:value="${viewModel.startDate}"
                                   class="form-control">
                        </div>

                        <div class="col-md-5">
                            <label class="form-label">End Date</label>
                            <input type="datetime-local"
                                   name="endDate"
                                   th:value="${viewModel.endDate}"
                                   class="form-control">
                        </div>
                        <div class="col-md-6">
                            <div style="display:flex; align-items:center; gap:15px;">

                                <button type="submit" class="btn btn-main">
                                    Search
                                </button>
                                <button type="reset" class="btn" style="background: #b0b0b0;">
                                    Clear
                                </button>

                            </div>
                        </div>

                    </div>
                    <p class="text-danger" th:text="${searchErrors}" style="margin-left:35px;"></p>

                </form>
            </div>


            <div class=" filter w-50 border p-4 rounded shadow-sm">
                <form th:action="@{/event/filter}" method="get">

                    <div class="row g-2 mb-3">

                        <div class="col-md-6">
                            <label class="form-label">Start Date</label>
                            <input type="datetime-local"
                                   name="startDate"
                                   th:value="${viewModel.filterStartDate}"
                                   class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">End Date</label>
                            <input type="datetime-local"
                                   name="endDate"
                                   th:value="${viewModel.filterEndDate}"
                                   class="form-control">
                        </div>

                    </div>


                    <div style="display:flex; align-items:center; gap:15px; margin-top: 40px" >
                    <button type="submit" class="btn btn-danger">
                        Filter
                    </button>
                        <button type="reset" class="btn" style="background: #b0b0b0">
                            Clear Filters
                        </button>

                    </div>
                    <p class="text-danger" th:text="${filterErrors}" style="margin: 16px"></p>
                </form>
            </div>

        </div>
        <div style="display: flex; justify-content: space-between">
            <a th:if="${viewModel.showBackButton}" th:text="${viewModel.textFlag ? 'All Dates' : 'Go back'}" th:href="@{/event}" class="btn btn-secondary mb-4"/>
            <p th:if="${viewModel.showBackButton}" th:text="${viewModel.resultCount + ' Results Found'} " class="text-secondary"/>
        </div>



        <div class="row g-4">
            <div class="col-md-3"
                 th:each="event : ${viewModel.getEvents()}">

                <div class="event-card">

                    <h5 class="event-title fw-semibold" th:text="*{event.name}"></h5>

                    <div class="mt-3 d-flex">
                        <strong style="width:110px;">Start Date:</strong>
                        <span th:text="*{#temporals.format(event.startDate,'yyyy-MM-dd')}"></span>
                    </div>

                    <div class="mt-2 d-flex">
                        <strong style="width:110px;">End Date:</strong>
                        <span th:text="*{#temporals.format(event.endDate,'yyyy-MM-dd')}"></span>
                    </div>

                    <div class="mt-2 d-flex">
                        <strong style="width:110px;">Price:</strong>
                        <span th:text="*{#numbers.formatCurrency(event.price)}"></span>
                    </div>

                    <div class="mt-4 d-flex justify-content-center gap-3">

                        <a th:href="@{/event/{id}(id=*{event.id})}" class="btn btn-main">
                            Details
                        </a>

                        <a th:href="@{/event/delete/{id}(id=*{event.id})}" class="btn btn-danger">
                            Delete
                        </a>

                    </div>

                </div>

            </div>

        </div>
        <p th:if="${viewModel.isEmpty()}" class="text-center mt-5">
            No Events Found
        </p>

    </main>
</div>
<th:block th:replace="~{footer :: footer}"/>
</body>
</html>
