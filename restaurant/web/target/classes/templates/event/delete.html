<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Event</title>
    <th:block th:replace="~{partial :: bootstrap}"/>
</head>
<body>
<header>
    <th:block th:replace="~{nav :: nav}"/>
</header>
<Style>
    body {
        background: #EEEEEE;
        font-family: system-ui, sans-serif;
    }

    .delete-card {
        max-width: 650px;
        background: #fff;
        padding: 30px;
        border-radius: 18px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    .label {
        font-weight: 600;
    }
</Style>

<div class="container mt-5 d-flex justify-content-center">
    <div class="col-6">

        <h2 class="mb-4">Delete Event</h2>

        <div class="delete-card mx-auto">

            <div class="text-center mb-4">
                <h2 class="event-title" th:text="${event.name}"></h2>
                <p class="event-description" th:text="${event.description}"></p>
            </div>

            <div class="row mb-2">
                <div class="col-6 label">Price:</div>
                <div class="col-6">$ <span th:text="${event.price}"></span></div>
            </div>

            <div class="row mb-2">
                <div class="col-6 label">Start Date:</div>
                <div class="col-6" th:text="${#temporals.format(event.startDate,'YYYY-MM-dd')}"></div>
            </div>

            <div class="row mb-2">
                <div class="col-6 label">End Date:</div>
                <div class="col-6" th:text="${#temporals.format(event.endDate,'YYYY-MM-dd')}"></div>
            </div>

            <div class="row mb-2">
                <div class="col-6 label">Created Date:</div>
                <div class="col-6" th:text="${#temporals.format(event.createdAt,'YYYY-MM-dd')}"></div>
            </div>

            <div class="row mb-2">
                <div class="col-6 label">Last Updated Date:</div>
                <div class="col-6" th:text="${#temporals.format(event.updatedAt,'YYYY-MM-dd HH:mm')}"></div>
            </div>

        </div>
    </div>
</div>

<div th:replace="~{seating/fragments :: list}"></div>

<!-- WARNING TEXT -->
<h3 class="text-center text-danger mt-5">
    Are you sure you want to delete this event ?
</h3>


<!-- ACTION BUTTONS -->
<div class="d-flex justify-content-center gap-5 mt-4 mb-5">

    <a th:href="@{/event}" class="btn btn-danger btn-lg">
        Go Back
    </a>

    <form th:action="@{/event/delete/{id}(id=${event.id})}" method="post">
        <button type="submit" class="btn btn-danger btn-lg">
            Delete
        </button>
    </form>

</div>
<th:block th:replace="~{footer :: footer}"/>
</body>
</html>
