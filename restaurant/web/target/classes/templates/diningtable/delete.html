<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <title>Delete Table</title>
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>
<div class="container">
    <main role="main" class="pb-3 mt-4">
        <h1 class="display-6 fw-bold">Are you sure you want to delete this Table?</h1>
        <div class="row">
            <div class="col-md-6">
                <div th:replace="~{diningtable/fragments :: details}"></div>

                <form method="post" th:action="@{/diningTable/delete/{tableId}(tableId=${diningTable.id})}">
                    <input type="submit" value="Delete" class="btn btn-danger mt-2"/>
                </form>
            </div>
        </div>
        <div>
            <a th:href="@{/diningTable}" class="btn btn-dark mt-2">Go Back</a>
        </div>
    </main>
</div>
<th:block th:replace="~{footer::footer}"/>
</body>
</html>
