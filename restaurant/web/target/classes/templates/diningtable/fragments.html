
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Input</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet"/>
    <script type="text/javascript" th:src="@{/js/bootstrap.min.js}"></script>
</head>
<body>


<!--/*@thymesVar id="diningTable" type="nbcc.resto.dto.DiningTable"*/-->
<th:block th:fragment="input" th:object="${diningTable}">
    <div class="card shadow-sm mt-4">
        <div class="card-header bg-success text-white">
            <h5 class="card-title mb-0">Create Dining Table</h5>
        </div>
        <div class="card-body">
            <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}" role="alert">
                <strong>Error!</strong>
                <div th:each="err : ${#fields.globalErrors}" th:text="${err}"></div>
            </div>

            <input type="hidden" th:field="*{id}"/>
            <input type="hidden" th:field="*{version}"/>

            <div class="mb-3">
                <label class="form-label fw-bold">
                    Table Name
                    <input th:field="*{name}" class="form-control mt-1" placeholder="Enter table name"/>
                </label>
                <div class="text-danger small mt-1 fw-semibold" th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">
                    Capacity
                    <input type="number" th:field="*{capacity}" class="form-control mt-1" placeholder="Enter table capacity"/>
                </label>
                <div class="text-danger small mt-1 fw-semibold" th:errors="*{capacity}"></div>
            </div>
        </div>
    </div>
</th:block>

<!-- Details-->
<th:block th:fragment="details" th:object="${diningTable}">
    <div class="card shadow mt-2">

        <div class="card-body">
            <div class="row">
                <div class="col-md-8">
                    <dl class="row">
                        <dt class="col-sm-4 text-muted">Name:</dt>
                        <dd class="col-sm-8 fw-bold fs-5" th:text="*{name}"></dd>

                        <dt class="col-sm-4 text-muted">Capacity:</dt>
                        <dd class="col-sm-8 fs-6" th:text="*{capacity}"></dd>
                    </dl>
                </div>
            </div>
        </div>
    </div>
</th:block>

<!--/*@thymesVar id="viewModel" type="nbcc.resto.viewmodel.DiningTableListViewModel"*/-->
<th:block th:fragment="list" th:object="${viewModel}">
    <div class="card shadow-sm mt-4">
        <div class="card-header bg-light d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0 text-dark">Tables Available</h5>
        </div>
        <div class="card-body p-0" th:unless="*{isEmpty()}">
            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th class="fw-bold">Name</th>
                        <th class="fw-bold">Capacity</th>

                        <th class="fw-bold text-center">Manage</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="diningTable : *{diningTables}" class="align-middle">
                        <td>
                            <strong class="text-success" th:text="${diningTable.name}"></strong>
                        </td>
                        <td>
                            <strong class="text-success" th:text="${diningTable.capacity}"></strong>
                        </td>
                        <td class="fw-bold text-center">
                            <a th:href="@{/diningTable/edit/{id}(id=${diningTable.id})}" class="btn btn-secondary">Edit</a>
                            <a th:href="@{/diningTable/delete/{id}(id=${diningTable.id})}" class="btn btn-danger">Delete</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-body text-center py-5" th:if="*{isEmpty()}">
            <div class="text-muted">
                <h5>No Tables Found</h5>
            </div>
        </div>
    </div>
</th:block>

</body>
</html>
