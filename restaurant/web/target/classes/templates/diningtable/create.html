<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <title>Create Dining Table</title>
</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>
<div class="container">
    <main role="main" class="pb-3">
        <div class="row">
            <div class="col-md-4">
                <form th:action="@{/diningTable/create}" method="post" th:object="${diningTable}">
                    <div th:replace="~{diningtable/fragments :: input}"></div>
                    <div class="form-group">
                        <input type="submit" value="Save" class="btn btn-success mt-2"/>
                    </div>
                </form>
            </div>
        </div>
        <div>
            <a class="btn btn-dark mt-2" th:href="@{/diningTable}">Go Back</a>
        </div>
    </main>
</div>
<th:block th:replace="~{footer::footer}"/>
</body>
</html>
