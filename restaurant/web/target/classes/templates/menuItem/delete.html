<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Delete Menu Item</title>
  <link th:replace="~{partial :: bootstrap}"/>
  <link rel="stylesheet" th:href="@{/css/commonStyle/button.css}">

</head>
<body>
<header>
  <nav th:replace="~{nav :: navbar}"></nav>
</header>
<div class="container mt-5">
  <div class="card mx-auto" style="max-width: 500px;">
    <div class="card-body p-4">

      <h4 class="tex-center me-2" >You are Editing Item for <span class="text-warning" th:text="${menu.name}"></span> Menu</h4>
      <p class="text-muted mb-4">Are you sure you want to delete this menu item?</p>

      <dl class="row mb-4">
        <dt class="col-sm-4">Name</dt>
        <dd class="col-sm-8" th:text="${menuItem.name}"></dd>

        <dt class="col-sm-4">Description</dt>
        <dd class="col-sm-8" th:text="${menuItem.description}"></dd>
      </dl>

      <div class="d-flex gap-3">
        <form th:action="@{/menuItem/delete/{id}(id=${menuItem.id})}" method="post">
          <button type="submit" class="btn btn-danger px-4">Delete</button>
        </form>
        <a th:href="@{/menu/edit/{id}(id=${menuItem.menuId})}" class="btn btn-secondary px-4">
          Go back
        </a>
      </div>

    </div>
  </div>
</div>
<th:block th:replace="~{footer :: footer}"/>

</body>
</html>
