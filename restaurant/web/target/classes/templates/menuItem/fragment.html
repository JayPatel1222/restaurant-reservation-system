<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<link th:replace="~{partial :: bootstrap}"/>
<link rel="stylesheet" th:href="@{/css/commonStyle/button.css}">
<body>

<!--/*@thymesVar id="menuItem" type="nbcc.resto.dto.MenuItem"*/-->
<th:block th:fragment="input" th:object="${menuItem}">

  <input type="hidden" name="menuId" th:value="${menuItem.menuId}"/>
  <div class="container-fluid w-25 mt-4">
    <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}" role="alert">
      <strong>Error!</strong>
      <div th:each="err : ${#fields.globalErrors}" th:text="${err}"></div>
    </div>
    <!-- Name -->
    <div class="mb-3">
      <input type="hidden" th:field="*{id}"/>
      <label class="form-label fw-semibold">Name:</label>
      <input type="text"
             th:field="*{name}"
             class="form-control rounded-3">
      <div class="text-danger small mt-1" th:errors="*{name}"></div>
    </div>

    <!-- Description -->
    <div class="mb-4">
      <label class="form-label fw-semibold">Description</label>
      <textarea th:field="*{description}"
                class="form-control rounded-3"
                rows="3"></textarea>
      <div class="text-danger small mt-1" th:errors="*{description}"></div>
    </div>


  </div>

</th:block>

</body>
</html>
