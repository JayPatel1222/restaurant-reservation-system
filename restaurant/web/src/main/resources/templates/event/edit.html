<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <th:block th:replace="~{partial :: bootstrap}"/>
  <title>Update Event</title>
  <link rel="stylesheet" th:href="@{/css/events.css}">
  <th:block th:replace="~{event/styleFragment :: commonCss}"/>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
<header>
  <nav th:replace="~{nav :: navbar}"></nav>
</header>

<div class="container">

  <div class="form-box">

    <h2 class="mb-4 fw-bold">Edit Event</h2>

    <form th:action="@{/event/edit/{id}(id=*{id})}" method="post" th:object="${event}">
      <input type="hidden" th:field="*{version}"/>
      <div th:replace="~{event/fragments :: input}"></div>
      <div class="row mt-4">

        <div class="col-12 d-flex justify-content-center gap-2">
          <input  type="submit" value="Save" class="btn btn-main"/>

          <a th:href="@{/event}" class="btn btn-secondary">
            Go Back
          </a>
          <div>
            <button type="button" class="btn btn-info"
                    data-bs-toggle="modal"
                    data-bs-target="#menuModal"
                    id="menu-select-btn"
            >
              Select Menu
            </button>

            <a th:href="@{/event/{id}/seating/create(id=*{id})}" class="btn btn-warning">
              Add Seating
            </a>
          </div>
        </div>
      </div>

    </form>


  </div>
    <div th:replace="~{seating/fragments :: list}"></div>
  <div th:replace="~{event/modalFragment :: modal}"></div>
</div>
<th:block th:replace="~{footer :: footer}"/>
<script th:src="@{/js/menu.js}" defer></script>
</body>
</html>
