<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
  <th:block th:replace="~{partial :: bootstrap}"/>
    <title>Event Details</title>
  <link rel="stylesheet" th:href="@{/css/details.css}">
  <th:block th:replace="~{event/styleFragment :: commonCss}"/>
</head>
<body>
<header>
  <th:block th:replace="~{nav :: nav}"/>
</header>
<div class="container mt-5">

  <h1 class="mb-4">Event Details</h1>

  <div class="event-card mx-auto" th:object="${event}">

    <div class="text-center mb-4">
      <h2 class="event-title" th:text="*{name}"></h2>
      <p class="event-description" th:text="*{description}"></p>
    </div>

    <div class="info-grid">

      <div>
        <div class="label">PRICE</div>
        <div class="value" th:text="*{#numbers.formatCurrency(price)}"></div>
      </div>

      <div>
        <div class="label">START DATE</div>
        <div class="value" th:text="*{#temporals.format(startDate, 'yyyy-MM-dd')}"></div>
      </div>

      <div>
        <div class="label">END DATE</div>
        <div class="value" th:text="*{#temporals.format(endDate, 'yyyy-MM-dd')}"></div>
      </div>

      <div>
        <div class="label">CREATED ON</div>
        <div class="value" th:text="*{#temporals.format(createdAt, 'yyyy-MM-dd')}"></div>
      </div>

      <div>
        <div class="label">LAST UPDATED ON</div>
        <div class="value" th:text="*{#temporals.format(updatedAt, 'yyyy-MM-dd : HH:mm')}"></div>
      </div>

    </div>

    <div class="d-flex justify-content-center align-items-center gap-3 mt-5 action-bar">

      <a th:href="@{/event}" class="btn btn-secondary action-btn">
        Go Back
      </a>

      <a th:href="@{/event/{id}/seating/create(id=*{id})}" class="btn btn-main action-btn">
        Add Seating
      </a>

      <a th:href="@{/event/edit/{id}(id=*{id})}" class="btn btn-warning action-btn">
        Edit
      </a>

      <a th:href="@{/event/delete/{id}(id=*{id})}" class="btn btn-danger action-btn">
        Delete Event
      </a>

    </div>

  </div>
    <div th:replace="~{reservation/fragments :: reservationsList}"></div>


</div>
<th:block th:replace="~{footer :: footer}"/>
</body>

</html>
