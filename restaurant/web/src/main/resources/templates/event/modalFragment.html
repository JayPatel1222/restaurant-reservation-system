<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modal</title>
</head>
<body>
<!--/*@thymesVar id="event" type="nbcc.resto.dto.UrbanPlatterEvent"*/-->
<th:block th:fragment="modal">
    <div class="modal fade"
         id="menuModal"
         tabindex="-1"
         aria-hidden="true"
         aria-modal="true"
         role="dialog"
         style="display:none;">
        <div class="modal-dialog modal-dialog-scrollable">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Available Menus</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <!--/*@thymesVar id="menus" type="java.util.List<nbcc.resto.dto.Menu>"*/-->
                    <div th:if="${#lists.isEmpty(menus)}">
                        <p>No menus available</p>
                    </div>

                    <ul class="list-group" th:if="${not #lists.isEmpty(menus)}">
                        <li class="list-group-item d-flex justify-content-between align-items-center">

                            <label class="w-100 d-flex justify-content-between align-items-center mb-0">

                                <span class="text-muted">No Menu</span>

                                <input type="radio"
                                       name="menuId"
                                       value=""
                                       th:checked="${event.menu?.id == null}"
                                       class="form-check-input"/>
                            </label>

                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center"
                            th:each="menu : ${menus}">

                            <label class="w-100 d-flex justify-content-between align-items-center mb-0"
                                   style="cursor:pointer;">
                                <span th:text="${menu.name}"></span>

                                <input type="radio"
                                       name="menuId"
                                       th:value="${menu.id}"
                                       th:checked="${(event.menu != null) ? menu.id == event.menu.id  : false}"
                                       class="form-check-input"/>
                            </label>
                        </li>
                    </ul>

                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" id="modal-add-btn">Add</button>
                    <button class="btn btn-danger" id="close-modal-btn" data-bs-dismiss="modal">Close</button>
                </div>

            </div>
        </div>
    </div>
</th:block>
</body>
</html>
