<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Menus</title>

    <link th:replace="~{partial :: bootstrap}"/>
    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <link rel="stylesheet" th:href="@{/css/commonStyle/button.css}">

</head>
<body>
<header>
    <nav th:replace="~{nav :: navbar}"></nav>
</header>
<div class="container">

    <h1 class="title">MENUS</h1>
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

       <div>
           <h5 th:if="${!viewModel.getMenus().isEmpty()}" class="text-center">Click on Menu to view details</h5>
       </div>

        <form th:action="@{/menu/search}" method="get" class="d-flex gap-2">
            <input type="text" name="name" th:value="${viewModel.nameToSearch}" class="form-control search-box" placeholder="ENTER NAME" required>
            <button type="submit" class="btn btn-main">SEARCH</button>
            <a th:href="@{/menu}" class="btn btn-secondary">CLEAR</a>
        </form>

    </div>

    <div th:if="${viewModel.isShowResultNotFound()}" class="text-center">
        <p class="text-center fs-2 fw-semibold">No Menu Found with this name </p>
    </div>

    <div th:if="${viewModel.isShowNoMenusFound()}" class="text-center">
        <p class="text-center fs-2 fw-semibold">No Menus yet</p>

        <div>
            <p>Want to Create Menu ? Click on create</p>
            <a th:href="@{/menu/create}" class="btn btn-primary">Create Menu</a>
        </div>
    </div>


    <div class="row g-4" th:if="${!viewModel.getMenus().isEmpty()}">

        <div class="col-md-4 col-lg-3" th:each="menu : ${viewModel.getMenus()}">

            <a th:href="@{/menu/detail/{id}(id=${menu.id})}"
               class="text-decoration-none text-dark">

                <div class="card h-100 shadow-sm border-0 rounded-4">
                    <div class="card-body d-flex align-items-center  justify-content-center">

                        <h5 class="card-title fw-semibold text-center mb-0"
                            th:text="${menu.name}">
                        </h5>

                    </div>
                </div>

            </a>

        </div>

    </div>

    <div class="mt-5" th:if="${!viewModel.getMenus().isEmpty()}">
        <p>Want to Create Menu ? Click on create</p>
        <a th:href="@{/menu/create}" class="btn btn-primary">Create Menu</a>
    </div>

</div>
<th:block th:replace="~{footer :: footer}"/>
</body>
</html>
