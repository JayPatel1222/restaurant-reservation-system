<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <th:block th:replace="~{partial :: bootstrap}"/>
    <title>Event Details</title>
    <link rel="stylesheet" th:href="@{/css/details.css}">
    <th:block th:replace="~{event/styleFragment :: commonCss}"/>
</head>
<body>
<header>
    <th:block th:replace="~{nav :: nav}"/>
</header>
<div class="container mt-5">
    <div class="card shadow-sm rounded-4 text-center p-4 border-0 w-50 mx-auto mb-2">
        <div class="card-body">
            <h2 class="fw-bold text-success mb-1">Thank you for booking with us!</h2>
        </div>
    </div>
    <div class="event-card mx-auto" th:object="${reservation}">
        <div class="text-center mb-4">
            <h2 class="event-title">Reservation Details</h2>
        </div>
        <div class="info-grid">

            <div>
                <div class="label">GUEST NAME</div>
                <div class="value" th:text="${reservation.firstName} + ' ' + ${reservation.lastName}"></div>
            </div>
            <div>
                <div class="label">EMAIL</div>
                <div class="value" th:text="*{email}"></div>
            </div>
            <div>
                <div class="label">GROUP SIZE</div>
                <div class="value" th:text="*{groupSize}"></div>
            </div>
            <div>
                <div class="label">EVENT</div>
                <div class="value" th:text="*{seating.platterEvent.name}">
                </div>
            </div>
            <div>
                <div class="label">SEATING</div>
                <div class="value" th:text="*{seating.name}"></div>
                <div class="value text-muted" th:text="*{#temporals.format(seating.startDate, 'dd-MM-yyyy : HH:mm')}"></div>
                <div class="value text-muted" th:text="${reservation.seating.duration} + ' min'"></div>
            </div>
            <div th:with="status = ${T(nbcc.resto.dto.ReservationStatus)}">
                <div class="label">STATUS</div>
                <div class="value">
                    <strong th:if="*{status == status.PENDING }" class="text-warning" th:text="*{status}"></strong>
                    <strong th:if="*{status == status.DENIED }" class="text-danger" th:text="*{status}"></strong>
                    <strong th:if="*{status == status.APPROVED }" class="text-success" th:text="*{status}"></strong>
                </div>
            </div>

        </div>

        <div class="d-flex justify-content-center align-items-center gap-3 mt-5 action-bar">
            <a th:href="@{/}" class="btn btn-secondary action-btn">
                Close
            </a>
        </div>
    </div>
</div>
<th:block th:replace="~{footer :: footer}"/>
</body>

</html>
