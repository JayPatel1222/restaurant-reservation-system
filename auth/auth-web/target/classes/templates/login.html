<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{partial :: bootstrap}"/>
    <title>Login</title>
</head>
<body class="bg-light min-vh-100 d-flex flex-column">

<header>
    <div th:insert="~{nav :: nav}"></div>
</header>

<div class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="card shadow border-0 rounded-4 p-4" style="width: 100%; max-width: 420px;">
        <div class="card-body px-2">

            <div class="text-center mb-4">
                <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 56px; height: 56px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary" viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="11" rx="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <h2 class="fw-semibold mb-1">Welcome back</h2>
                <p class="text-muted small mb-0">Sign in to continue to your account</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-exclamation-circle-fill flex-shrink-0" viewBox="0 0 16 16">
                    <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM8 4a.905.905 0 0 0-.9.995l.35 3.507a.552.552 0 0 0 1.1 0l.35-3.507A.905.905 0 0 0 8 4zm.002 6a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/>
                </svg>
                <span class="small">Invalid username or password. Please try again.</span>
            </div>

            <form th:action="@{/login}" method="post">

                <div class="mb-3">
                    <label for="username" class="form-label fw-medium small">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted" viewBox="0 0 24 24">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                        <input
                                type="text"
                                id="username"
                                name="username"
                                th:value="${param.username}"
                                class="form-control border-start-0 ps-0"
                                placeholder="Enter your username"
                                autocomplete="username"
                                required
                        />
                    </div>
                </div>

                <div class="mb-1">
                    <label for="password" class="form-label fw-medium small">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted" viewBox="0 0 24 24">
                                <rect x="3" y="11" width="18" height="11" rx="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <input
                                type="password"
                                id="password"
                                name="password"
                                class="form-control border-start-0 ps-0"
                                placeholder="Enter your password"
                                autocomplete="current-password"
                                required
                        />
                    </div>
                </div>

                <div class="text-end mb-4">
                    <a href="#" class="text-muted small text-decoration-none">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-medium">
                    Sign in
                </button>

            </form>

            <hr class="my-4"/>

            <p class="text-center text-muted small mb-0">
                Don't have an account? <a th:href="@{/register}" class="text-decoration-none fw-medium">Create one</a>
            </p>

        </div>
    </div>
</div>

</body>
</html>
